version: '3.8'
services:
  zentry-db:
    image: postgres:16
    container_name: zentry_postgres
    environment:
      - POSTGRES_DB=zentry_iam
      - POSTGRES_USER=ranxom
      - POSTGRES_PASSWORD=super_secure_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ranxom -d zentry_iam"]
      interval: 10s
      timeout: 5s
      retries: 5

  zentry-redis:
    image: redis:7-alpine
    container_name: zentry_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5