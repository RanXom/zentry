# Database Configuration (Injected via .env)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

# Security Configuration (Injected via .env)
zentry.security.jwt.secret=${JWT_SECRET}
zentry.security.jwt.expiration=3600000
zentry.security.jwt.refresh-expiration=604800000

# Redis Configuration (Upstash)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true