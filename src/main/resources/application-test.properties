# --- Database Connection ---
spring.datasource.url=jdbc:h2:mem:zentry_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Hibernate's auto-gen so it doesn't fight with Flyway
spring.jpa.hibernate.ddl-auto=none
# Ensure Flyway is active for the test environment
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- Security Testing Props ---
# This is a dummy key for CI/CD.
zentry.security.jwt.secret=Zm9yX3Rlc3RpbmdfcHVycG9zZXNfb25seV9kby1ub3QtdXNlLWluLXByb2Q=
zentry.security.jwt.expiration=3600000
zentry.security.jwt.refresh-expiration=604800000

spring.data.redis.host=localhost
spring.data.redis.port=6379